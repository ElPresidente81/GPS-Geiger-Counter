<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Radar Prototype</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #fff; }
        #setup { display: block; }
        #monitor { display: none; }
        input { padding: 10px; width: 80%; margin: 10px 0; border: 1px solid #ccc; }
        button { padding: 15px 30px; cursor: pointer; font-size: 1rem; border: none; border-radius: 5px; display: block; margin: 10px auto; width: 80%; }
        .btn-start { background: #007bff; color: white; }
        .btn-control { background: #6c757d; color: white; }
        svg { width: 300px; height: 300px; margin: 20px auto; display: block; }
        circle { stroke: black; stroke-width: 2; transition: fill 0.3s; }
        text { font-size: 8px; font-weight: bold; text-anchor: middle; fill: white; pointer-events: none; }
        #debug-info { font-size: 12px; color: #555; margin-top: 20px; text-align: left; padding: 0 20px; border-top: 1px solid #eee; }
    </style>
</head>
<body>

<div id="setup">
    <h1>Proximity Radar</h1>
    <input type="text" id="coords" placeholder="N 39 00.476 W 084 08.750">
    <button class="btn-start" onclick="startApp()">START MONITOR</button>
    <button class="btn-control" onclick="setCurrentAsTarget()">SET TO CURRENT GPS</button>
</div>

<div id="monitor">
    <h2 id="dist-display">Distance: --</h2>
    <svg viewBox="0 0 200 200">
        <circle id="c1" cx="100" cy="100" r="90" fill="red" />
        <circle id="c2" cx="100" cy="100" r="60" fill="red" />
        <circle id="c3" cx="100" cy="100" r="30" fill="red" />
        <circle id="c4" cx="100" cy="100" r="10" fill="red" />
        <text x="100" y="25">50-100m</text>
        <text x="100" y="55">25-50m</text>
        <text x="100" y="85">10-25m</text>
        <text x="100" y="103">&lt;10m</text>
    </svg>
    <button class="btn-control" onclick="togglePause()" id="pause-btn">PAUSE</button>
    <button class="btn-control" onclick="stopApp()" style="background: #dc3545;">STOP</button>

    <div id="debug-info">
        <div>Target: <span id="target-coords">--</span></div>
        <div>Current: <span id="current-coords">--</span></div>
    </div>
</div>

<script>
    let target = { lat: 0, lon: 0 };
    let isPaused = false;
    let isActive = false;
    let pollTimeout = null;

    function setCurrentAsTarget() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById('coords').value = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
            }, (err) => { alert("Location access denied."); });
        }
    }

    function parseCoords(input) {
        const cleanInput = input.replace(/[^\d\.\-\sNSEW]/gi, ' ');
        const parts = cleanInput.match(/(\d+\.?\d*)/g);
        if (cleanInput.toUpperCase().includes('N') || cleanInput.toUpperCase().includes('S') || 
            cleanInput.toUpperCase().includes('E') || cleanInput.toUpperCase().includes('W')) {
            let lat = parseFloat(parts[0]) + parseFloat(parts[1])/60;
            if (cleanInput.toUpperCase().includes('S')) lat = -lat;
            let lon = parseFloat(parts[2]) + parseFloat(parts[3])/60;
            if (cleanInput.toUpperCase().includes('W')) lon = -lon;
            return { lat, lon };
        }
        const [lat, lon] = input.split(',').map(Number);
        return { lat, lon };
    }

    function startApp() {
        target = parseCoords(document.getElementById('coords').value);
        document.getElementById('target-coords').innerText = `${target.lat.toFixed(5)}, ${target.lon.toFixed(5)}`;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('monitor').style.display = 'block';
        isActive = true;
        updateLocation();
    }

    function updateLocation() {
        if (!isActive) return;
        if (isPaused) {
            pollTimeout = setTimeout(updateLocation, 5000);
            return;
        }

        navigator.geolocation.getCurrentPosition((pos) => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            document.getElementById('current-coords').innerText = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
            
            const dist = getDistance(lat, lon, target.lat, target.lon);
            const bearing = getBearing(lat, lon, target.lat, target.lon);
            
            document.getElementById('dist-display').innerText = `Distance: ${Math.round(dist)}m (${bearing})`;
            
            document.getElementById('c1').style.fill = (dist < 50) ? '#ccc' : 'red';
            document.getElementById('c2').style.fill = (dist < 25) ? '#ccc' : 'red';
            document.getElementById('c3').style.fill = (dist < 10) ? '#ccc' : 'red';

            // DYNAMIC POLLING LOGIC
            let pollInterval = (dist < 20) ? 1000 : (dist < 100) ? 5000 : 10000;
            pollTimeout = setTimeout(updateLocation, pollInterval);

        }, (err) => {
            console.error(err);
            pollTimeout = setTimeout(updateLocation, 5000);
        }, {enableHighAccuracy: true});
    }

    function getBearing(lat1, lon1, lat2, lon2) {
        const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
        const Δλ = (lon2 - lon1) * Math.PI/180;
        const y = Math.sin(Δλ) * Math.cos(φ2);
        const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
        let θ = Math.atan2(y, x);
        let deg = (θ * 180 / Math.PI + 360) % 360;
        const compass = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"];
        return compass[Math.round(deg / 45) % 8];
    }

    function togglePause() {
        isPaused = !isPaused;
        document.getElementById('pause-btn').innerText = isPaused ? "RESUME" : "PAUSE";
    }

    function stopApp() {
        isActive = false;
        if (pollTimeout) clearTimeout(pollTimeout);
        document.getElementById('setup').style.display = 'block';
        document.getElementById('monitor').style.display = 'none';
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180, Δλ = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2) * Math.sin(Δλ/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>
</body>
</html>
